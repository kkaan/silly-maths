<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Silly Unicorn Maths</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=18">
</head>
<body>

  <!-- ========================================================
       USERNAME SCREEN
       ======================================================== -->
  <div class="username-overlay" id="username-overlay">
    <div class="username-card">
      <div class="username-unicorn">&#129412;</div>
      <h2 class="username-title">Who's playing?</h2>
      <input type="text" id="username-input" class="username-input" placeholder="Your name" maxlength="20" autocomplete="off">
      <button class="go-btn username-go" id="username-go">Let's go!</button>
    </div>
  </div>

  <!-- ========================================================
       HERO — PARALLAX SECTION
       ======================================================== -->
  <section id="hero">
    <!-- Background: gradient sky (slowest parallax layer) -->
    <div class="parallax-bg"></div>

    <!-- Clouds (hero only) -->
    <div class="cloud-layer" aria-hidden="true">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="cloud cloud-4"></div>
      <div class="cloud cloud-5"></div>
      <div class="cloud cloud-6"></div>
      <div class="cloud cloud-7"></div>
      <div class="cloud cloud-8"></div>
      <div class="cloud cloud-9"></div>
      <div class="cloud cloud-10"></div>
    </div>

    <!-- Middle: Title (medium parallax layer) -->
    <div class="parallax-mid">
      <h1 class="hero-title">Silly Unicorn<br>Maths</h1>
      <p class="hero-subtitle">Metric Conversions</p>
    </div>

    <!-- Scroll indicator -->
    <div class="scroll-indicator">
      <span class="scroll-indicator-text">Scroll down</span>
      <span class="scroll-indicator-arrow">&#8964;</span>
    </div>
  </section>

  <!-- ========================================================
       GAME SECTION
       ======================================================== -->
  <section id="game">
    <div class="game-layout">

      <!-- Left column: Quiz -->
      <div class="game-main">
        <section class="stats-bar">
          <div class="stat" id="stat-attempts">
            <span class="stat-icon">&#128640;</span>
            <span>Attempts: <span id="attempts-count">0</span></span>
          </div>
          <div class="stat" id="stat-brave">
            <span class="stat-icon">&#11088;</span>
            <span>Brave Tries: <span id="brave-count">0</span></span>
          </div>
          <div class="stat" id="stat-correct">
            <span class="stat-icon">&#10004;&#65039;</span>
            <span>Correct: <span id="correct-count">0</span></span>
          </div>
          <div class="stat" id="stat-skittles">
            <span class="stat-icon">&#127852;</span>
            <span>Skittles: <span id="skittle-count">0</span></span>
          </div>
        </section>

        <!-- Rainbow progress bar with Fluffy -->
        <div class="rainbow-bar-wrap">
          <span class="rainbow-bar-label" id="level-badge">Lv 1</span>
          <div class="rainbow-bar-track">
            <div class="rainbow-bar-fill" id="rainbow-fill"></div>
            <canvas class="rainbow-bar-fluffy" id="unicorn-canvas"></canvas>
            <div class="rainbow-marker" id="marker-skittle" title="Next skittle">
              <span class="rainbow-marker-icon">&#127852;</span>
            </div>
            <div class="rainbow-marker" id="marker-icecream" title="Ice cream at 18">
              <span class="rainbow-marker-icon">&#127846;</span>
            </div>
            <div class="rainbow-marker rainbow-marker-goal" id="marker-levelup" title="Level up!">
              <span class="rainbow-marker-icon">&#11088;</span>
              <span class="rainbow-marker-text" id="marker-levelup-text">Lv 2</span>
            </div>
          </div>
        </div>

        <div class="earned-items" id="earned-items" style="display:none">
          <span class="earned-item" id="earned-wand" style="display:none" title="Fairy Wand">&#129668;</span>
          <span class="earned-item" id="earned-tiara" style="display:none" title="Silver Tiara">&#128081;</span>
          <span class="earned-item" id="earned-scepter" style="display:none" title="Royal Scepter">&#127942;</span>
        </div>

        <main class="question-area">
          <div class="question-card" id="question-card">
            <div class="question-text">
              <span id="q-value"></span>
              <span class="q-unit" id="q-from-unit"></span>
              <span class="q-equals">=</span>
              <input type="text" id="answer-input" inputmode="decimal" autocomplete="off" placeholder="?">
              <span class="q-unit" id="q-to-unit"></span>
            </div>
            <button class="go-btn" id="go-btn">Go!</button>
            <div class="particle-container" id="particle-container"></div>
          </div>
          <div class="encouragement" id="encouragement"></div>
        </main>

        <section class="animation-area" id="animation-area"></section>

        <!-- Category toggles removed — sidequests feature planned -->
        <footer class="category-toggles" style="display:none">
          <button class="cat-btn active" data-cat="length">Length</button>
          <button class="cat-btn active" data-cat="mass">Mass</button>
          <button class="cat-btn active" data-cat="capacity">Capacity</button>
          <button class="cat-btn active" data-cat="area" style="display:none">Area</button>
          <button class="cat-btn active" data-cat="rates" style="display:none">Rates</button>
          <button class="cat-btn active" data-cat="money" style="display:none">Money</button>
          <button class="cat-btn active" data-cat="numbers" style="display:none">Numbers</button>
        </footer>

        <p class="intro-hint" id="intro-hint">Type your answer and press Enter!</p>
      </div>

    </div>
  </section>

  <!-- Firebase SDK (CDN, compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <!-- Scripts (order matters) -->
  <script src="js/firebase-sync.js?v=18"></script>
  <script src="js/story.js?v=18"></script>
  <script src="js/quiz.js?v=18"></script>
  <script src="js/unicorn.js?v=18"></script>
  <script src="js/parallax.js?v=18"></script>
  <script src="js/app.js?v=18"></script>
</body>
</html>
